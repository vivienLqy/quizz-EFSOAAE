<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFSOAA — Quiz d'entraînement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2140;
  --navy-2:#16305a;
  --steel:#5a6c85;
  --paper:#f3efe4;
  --paper-2:#ece5d3;
  --card:#fffdf8;
  --ink:#1c1c1c;
  --gold:#b98a2f;
  --gold-light:#e8c877;
  --good:#2e7d4f;
  --good-bg:#e5f3ea;
  --bad:#b3413a;
  --bad-bg:#fbe9e7;
  --line:#d8cfb8;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Source Sans 3', system-ui, sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
}
::selection{ background:var(--gold-light); }

header.topbar{
  background:linear-gradient(135deg, var(--navy) 0%, var(--navy-2) 100%);
  color:#f3efe4;
  padding:22px 28px;
  display:flex;
  align-items:center;
  gap:18px;
  border-bottom:4px solid var(--gold);
}
.roundel{
  width:52px;height:52px;border-radius:50%;
  flex-shrink:0;
  background:conic-gradient(from 0deg, #16305a 0deg 120deg, #f3efe4 120deg 240deg, #9c1f28 240deg 360deg);
  border:2px solid var(--gold);
  position:relative;
}
.roundel::after{
  content:"";
  position:absolute; inset:16px;
  border-radius:50%;
  background:var(--navy);
  border:1px solid var(--gold-light);
}
header.topbar h1{
  font-family:'Oswald', sans-serif;
  font-weight:600;
  letter-spacing:1.5px;
  font-size:22px;
  margin:0;
  text-transform:uppercase;
}
header.topbar p{
  margin:2px 0 0;
  font-size:13px;
  color:#c9d2e0;
  letter-spacing:.3px;
}

/* ---------- TAB BAR ---------- */
.tabbar-wrap{
  background:var(--paper-2);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:10;
}
.tabbar{
  display:flex;
  gap:6px;
  max-width:800px;
  margin:0 auto;
  padding:10px 20px 0;
  overflow-x:auto;
}
.tab{
  font-family:'Oswald', sans-serif;
  letter-spacing:.5px;
  font-size:13.5px;
  background:none;
  border:none;
  border-bottom:3px solid transparent;
  padding:10px 18px;
  cursor:pointer;
  color:var(--steel);
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:8px;
  transition:color .12s ease, border-color .12s ease;
}
.tab:hover{ color:var(--navy); }
.tab.active{
  color:var(--navy);
  border-color:var(--gold);
  font-weight:600;
}
.tab .tab-score{
  font-size:11px;
  font-family:'Source Sans 3', sans-serif;
  background:var(--gold-light);
  color:var(--navy);
  padding:1px 7px;
  border-radius:10px;
  font-weight:600;
}

main.content{
  padding:30px 20px 70px;
  max-width:800px;
  margin:0 auto;
}

.quiz-title{
  font-family:'Oswald', sans-serif;
  font-size:26px;
  font-weight:600;
  color:var(--navy);
  margin:0 0 4px;
}
.quiz-sub{
  color:var(--steel);
  font-size:13.5px;
  margin:0 0 10px;
}
.section-heading{
  font-family:'Oswald', sans-serif;
  font-size:14px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#fff;
  background:var(--navy);
  display:inline-block;
  padding:6px 14px;
  border-radius:5px;
  margin:26px 0 14px;
}

.qcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:14px;
  box-shadow:0 1px 3px rgba(20,20,10,.05);
}
.qcard .qmeta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:8px;
}
.qcard .qnum{
  font-family:'Oswald',sans-serif;
  font-weight:600;
  color:var(--navy);
  font-size:14px;
}
.tag-group{ display:flex; gap:6px; flex-wrap:wrap; }
.tag{
  font-size:10.5px;
  letter-spacing:.4px;
  text-transform:uppercase;
  font-weight:600;
  padding:3px 9px;
  border-radius:20px;
  white-space:nowrap;
}
.tag.true{ background:#e4ecf7; color:#2c4a80; }
.tag.false{ background:#f7e6d8; color:#93481a; }
.tag.module{ background:#ede6d3; color:#6b5a2f; border:1px solid var(--line); }

.qcard .stem{
  font-weight:600;
  margin:0 0 10px;
  font-size:15px;
  color:var(--ink);
}
.option{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:9px 11px;
  border-radius:7px;
  border:1px solid transparent;
  cursor:pointer;
  margin-bottom:5px;
  transition:background .12s ease, border-color .12s ease;
  font-size:14px;
  line-height:1.4;
}
.option:hover{ background:#f2ecdd; }
.option input{ margin-top:3px; accent-color:var(--navy); flex-shrink:0; }
.option.correct{ background:var(--good-bg); border-color:var(--good); }
.option.incorrect{ background:var(--bad-bg); border-color:var(--bad); }
.option .letter{ font-weight:700; color:var(--steel); width:16px; flex-shrink:0; }
.option.correct .letter{ color:var(--good); }
.option.incorrect .letter{ color:var(--bad); }
.option.locked{ cursor:default; }

.qcr-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:14px 18px;
  margin-bottom:12px;
}
.qcr-card .qmeta{ margin-bottom:8px; }
.qcr-card .stem{ font-weight:600; margin:0 0 8px; font-size:14.5px; }
.qcr-card textarea{
  width:100%;
  min-height:52px;
  border:1px solid var(--line);
  border-radius:7px;
  padding:8px 10px;
  font-family:inherit;
  font-size:13.5px;
  resize:vertical;
  background:#fffef9;
}
.qcr-card .reveal-btn{
  margin-top:8px;
  background:none;
  border:1px solid var(--steel);
  color:var(--steel);
  border-radius:20px;
  font-size:12px;
  padding:5px 12px;
  cursor:pointer;
  font-family:inherit;
}
.qcr-card .reveal-btn:hover{ background:var(--steel); color:#fff; }
.qcr-card .answer{
  display:none;
  margin-top:10px;
  background:var(--good-bg);
  border-left:3px solid var(--good);
  padding:8px 12px;
  border-radius:0 6px 6px 0;
  font-size:13.5px;
}
.qcr-card .answer.show{ display:block; }

.action-bar{
  position:sticky;
  bottom:0;
  background:linear-gradient(to top, var(--paper) 70%, transparent);
  padding:16px 0 8px;
  display:flex;
  align-items:center;
  gap:14px;
  margin-top:10px;
  flex-wrap:wrap;
}
button.primary{
  font-family:'Oswald',sans-serif;
  letter-spacing:.5px;
  text-transform:uppercase;
  background:var(--navy);
  color:#fff;
  border:none;
  padding:12px 22px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(15,33,64,.3);
}
button.primary:hover{ background:var(--navy-2); }
button.ghost{
  font-family:'Oswald',sans-serif;
  letter-spacing:.5px;
  text-transform:uppercase;
  background:none;
  color:var(--navy);
  border:1px solid var(--navy);
  padding:11px 18px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}
button.ghost:hover{ background:var(--navy); color:#fff; }
.score-pill{
  font-family:'Oswald',sans-serif;
  font-weight:600;
  font-size:15px;
  padding:9px 16px;
  border-radius:20px;
  background:var(--gold-light);
  color:var(--navy);
  display:none;
}
.score-pill.show{ display:inline-block; }

footer.pagefoot{
  text-align:center;
  color:var(--steel);
  font-size:12px;
  padding:18px;
}
</style>
</head>

<script>
let currentQuiz = 0;
const state = QUIZZES.map(q => ({
  answers: new Array(q.qcm.length).fill(null),
  corrected: false
}));

function renderTabs(){
  const tabbar = document.getElementById('tabbar');
  tabbar.innerHTML = '';
  QUIZZES.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === currentQuiz ? ' active' : '');
    const st = state[i];
    let scoreHtml = '';
    if(st.corrected){
      const score = st.answers.reduce((acc,a,idx)=> acc + (a===q.qcm[idx].correct?1:0), 0);
      scoreHtml = `<span class="tab-score">${score}/${q.qcm.length}</span>`;
    }
    btn.innerHTML = `<span>${q.title}</span>${scoreHtml}`;
    btn.onclick = () => { currentQuiz = i; renderAll(); window.scrollTo({top:0, behavior:'smooth'}); };
    tabbar.appendChild(btn);
  });
}

function renderContent(){
  const quiz = QUIZZES[currentQuiz];
  const st = state[currentQuiz];
  const content = document.getElementById('content');
  content.innerHTML = '';

  const title = document.createElement('h2');
  title.className = 'quiz-title';
  title.textContent = quiz.title;
  content.appendChild(title);

  const sub = document.createElement('p');
  sub.className = 'quiz-sub';
  sub.textContent = "Modules mélangés — chaque question précise son type et son module d'origine.";
  content.appendChild(sub);

  const qcmHeading = document.createElement('div');
  qcmHeading.className = 'section-heading';
  qcmHeading.textContent = `QCM (${quiz.qcm.length})`;
  content.appendChild(qcmHeading);

  const letters = ['A','B','C','D'];

  quiz.qcm.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'qcard';

    const meta = document.createElement('div');
    meta.className = 'qmeta';
    meta.innerHTML = `<span class="qnum">Question ${qi+1}</span>
      <span class="tag-group">
        <span class="tag module">${q.module}</span>
        <span class="tag ${q.type}">${q.type==='false' ? 'Trouve la fausse' : 'Trouve la bonne'}</span>
      </span>`;
    card.appendChild(meta);

    if(q.stem){
      const stem = document.createElement('p');
      stem.className = 'stem';
      stem.textContent = q.stem;
      card.appendChild(stem);
    }

    q.options.forEach((opt, oi) => {
      const label = document.createElement('label');
      label.className = 'option';
      if(st.corrected) label.classList.add('locked');

      const input = document.createElement('input');
      input.type = 'radio';
      input.name = `q${currentQuiz}_${qi}`;
      input.checked = st.answers[qi] === oi;
      input.disabled = st.corrected;
      input.onchange = () => { st.answers[qi] = oi; };

      const letterSpan = document.createElement('span');
      letterSpan.className = 'letter';
      letterSpan.textContent = letters[oi];

      const textSpan = document.createElement('span');
      textSpan.textContent = opt;

      label.appendChild(input);
      label.appendChild(letterSpan);
      label.appendChild(textSpan);

      if(st.corrected){
        if(oi === q.correct) label.classList.add('correct');
        else if(st.answers[qi] === oi) label.classList.add('incorrect');
      }

      card.appendChild(label);
    });

    content.appendChild(card);
  });

  const actionBar = document.createElement('div');
  actionBar.className = 'action-bar';

  const correctBtn = document.createElement('button');
  correctBtn.className = 'primary';
  correctBtn.textContent = 'Corriger le QCM';
  correctBtn.onclick = () => { st.corrected = true; renderAll(); };
  actionBar.appendChild(correctBtn);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'ghost';
  resetBtn.textContent = 'Réinitialiser';
  resetBtn.onclick = () => {
    st.answers = new Array(quiz.qcm.length).fill(null);
    st.corrected = false;
    renderAll();
  };
  actionBar.appendChild(resetBtn);

  const scorePill = document.createElement('span');
  scorePill.className = 'score-pill' + (st.corrected ? ' show' : '');
  if(st.corrected){
    const score = st.answers.reduce((acc,a,idx)=> acc + (a===quiz.qcm[idx].correct?1:0), 0);
    scorePill.textContent = `Score : ${score} / ${quiz.qcm.length}`;
  }
  actionBar.appendChild(scorePill);

  content.appendChild(actionBar);

  const qcrHeading = document.createElement('div');
  qcrHeading.className = 'section-heading';
  qcrHeading.textContent = `QCR (${quiz.qcr.length}) — réponse courte`;
  content.appendChild(qcrHeading);

  quiz.qcr.forEach((item, qi) => {
    const card = document.createElement('div');
    card.className = 'qcr-card';

    const meta = document.createElement('div');
    meta.className = 'qmeta';
    meta.innerHTML = `<span class="tag-group"><span class="tag module">${item.module}</span></span>`;
    card.appendChild(meta);

    const stem = document.createElement('p');
    stem.className = 'stem';
    stem.textContent = `${qi+1}. ${item.q}`;
    card.appendChild(stem);

    const ta = document.createElement('textarea');
    ta.placeholder = 'Écris ta réponse ici avant de vérifier...';
    card.appendChild(ta);

    const revealBtn = document.createElement('button');
    revealBtn.className = 'reveal-btn';
    revealBtn.textContent = 'Voir la réponse';
    const answerDiv = document.createElement('div');
    answerDiv.className = 'answer';
    answerDiv.textContent = item.a;
    revealBtn.onclick = () => {
      answerDiv.classList.toggle('show');
      revealBtn.textContent = answerDiv.classList.contains('show') ? 'Masquer la réponse' : 'Voir la réponse';
    };
    card.appendChild(revealBtn);
    card.appendChild(answerDiv);

    content.appendChild(card);
  });
}

function renderAll(){
  renderTabs();
  renderContent();
}

renderAll();
</script>
